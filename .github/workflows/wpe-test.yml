name: Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

jobs:
  run-tests:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-type: [functional, acceptance]
        php-version: ['8.2']
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
    env:
      APPLICATION_ENV: test
      DB_USER: root
      DB_PASSWORD: root
      DB_HOST: 127.0.0.1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, mysqli
          tools: composer, wp-cli

      - name: Install PHP-FPM and Nginx
        run: |
          sudo apt-get update
          sudo apt-get install -y php${{ matrix.php-version }}-fpm nginx gettext-base
          sudo systemctl start php${{ matrix.php-version }}-fpm

      - name: Configure Nginx
        run: |
          sudo mv /etc/nginx/sites-available/default /etc/nginx/sites-available/default.bak
          envsubst '${PHP_VERSION} ${GITHUB_WORKSPACE}' < nginx-test-admin.conf > default.conf
          sudo mv default.conf /etc/nginx/sites-available/default
          sudo nginx -t
          sudo systemctl restart nginx

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            vendor
            ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Dependencies
        run: composer install --no-interaction --no-progress

      - name: Create .env file for tests
        run: cp ./tests/.env.ci ./tests/.env

      - name: Load Database
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS test;"
          mysql -h 127.0.0.1 -u root -proot test < ./tests/_support/Data/db/dump.sql

      - name: Start Chromedriver
        if: ${{ matrix.test-type == 'acceptance' }}
        run: |
          sudo apt-get install -y chromium-browser chromium-chromedriver
          nohup chromedriver --port=9515 &
          sleep 5

      - name: Run ${{ matrix.test-type }} tests
        run: |
          ./vendor/bin/codecept run ${{ matrix.test-type }} --no-interaction --skip-group=skipCI --html

      - name: Upload Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.test-type }}-test-artifacts-${{ github.sha }}
          path: |
            tests/_output/**
            php_errors.log
            /var/log/nginx/error.log
            /var/log/php${{ matrix.php-version }}-fpm.log

      - name: Stop Services
        if: always()
        run: |
          sudo systemctl stop php${{ matrix.php-version }}-fpm
          sudo systemctl stop nginx
          pkill chromedriver || true
